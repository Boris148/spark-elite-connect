name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cloudflare-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_PAGES_PROJECT: ${{ vars.CLOUDFLARE_PAGES_PROJECT }}
    steps:
      - name: Check Cloudflare configuration
        id: config
        run: |
          if [ -n "$CLOUDFLARE_API_TOKEN" ] && [ -n "$CLOUDFLARE_ACCOUNT_ID" ] && [ -n "$CLOUDFLARE_PAGES_PROJECT" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Cloudflare Pages deploy skipped: missing repo secrets or vars."
          fi
      - uses: actions/checkout@v4
        if: steps.config.outputs.ready == 'true'
      - uses: actions/setup-node@v4
        if: steps.config.outputs.ready == 'true'
        with:
          node-version: 20
          cache: npm
      - run: npm ci --legacy-peer-deps
        if: steps.config.outputs.ready == 'true'
      - run: npm run build
        if: steps.config.outputs.ready == 'true'
        env:
          VITE_BASE_PATH: /
      - uses: cloudflare/wrangler-action@v3
        if: steps.config.outputs.ready == 'true'
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=${{ vars.CLOUDFLARE_PAGES_PROJECT }} --branch=main
