<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Social Elite Marketing Group</title>
    <script>
      // SPA redirect for GitHub Pages
      sessionStorage.redirectPath = location.pathname + location.search + location.hash;
      const pathSegments = location.pathname.split('/').filter(Boolean);
      const repoBase = pathSegments.length > 0 ? `/${pathSegments[0]}/` : '/';
      location.replace(repoBase);
    </script>
  </head>

</html>
